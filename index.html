<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Guessing Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <h1> Guess the Number</h1>
    <p class="subtitle">Pick a number between <strong>1</strong> and <strong>100</strong></p>

    <div class="input-row">
      <input type="number" id="guessInput" min="1" max="100" placeholder="Your guess…" />
      <button id="submitBtn">Submit</button>
    </div>

    <p id="feedback" class="feedback"></p>
    <p id="attempts" class="attempts"></p>

    <button id="restartBtn" class="restart hidden">🔄 New Game</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
